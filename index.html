<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>客户信息收集表单</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <main class="page">
    <section class="form-card">
      <h1>客户信息收集</h1>
      <p class="subtitle">请填写以下信息，我们会尽快和你联系。</p>

      <form id="customerForm" novalidate>
        <div class="form-row">
          <label for="name">姓名 <span class="required">*</span></label>
          <input id="name" name="name" type="text" placeholder="请输入姓名" required />
        </div>

        <div class="form-row">
          <label for="phone">电话 <span class="required">*</span></label>
          <input id="phone" name="phone" type="tel" placeholder="请输入电话" required />
        </div>

        <div class="form-row">
          <label for="wechat">微信</label>
          <input id="wechat" name="wechat" type="text" placeholder="选填：请输入微信号" />
        </div>

        <div class="form-row">
          <label for="demand">需求描述 <span class="required">*</span></label>
          <textarea id="demand" name="demand" placeholder="请描述你的需求" required></textarea>
        </div>

        <button id="submitBtn" type="submit">提交信息</button>
      </form>

      <p id="feedback" class="feedback" aria-live="polite"></p>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
  <script src="./script.js"></script>
</body>
</html>
